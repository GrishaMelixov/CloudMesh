apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: log-aggregator-hpa
  namespace: cloudmesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: log-aggregator
  # Max replicas must not exceed Kafka partition count (12) to avoid idle consumers
  minReplicas: 1
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
