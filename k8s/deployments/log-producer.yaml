apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-producer
  namespace: cloudmesh
  labels:
    app: log-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-producer
  template:
    metadata:
      labels:
        app: log-producer
    spec:
      containers:
        - name: log-producer
          image: your-registry/cloudmesh-log-producer:latest
          envFrom:
            - configMapRef:
                name: cloudmesh-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
