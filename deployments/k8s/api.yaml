apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: cloudmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-api
  template:
    metadata:
      labels:
        app: metrics-api
    spec:
      containers:
        - name: metrics-api
          image: grishamelixov/cloudmesh-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cloudmesh-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-api
  namespace: cloudmesh
spec:
  type: LoadBalancer
  selector:
    app: metrics-api
  ports:
    - port: 80
      targetPort: 8080
