apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-aggregator
  namespace: cloudmesh
  labels:
    app: log-aggregator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-aggregator
  template:
    metadata:
      labels:
        app: log-aggregator
    spec:
      containers:
        - name: log-aggregator
          image: your-registry/cloudmesh-log-aggregator:latest
          envFrom:
            - configMapRef:
                name: cloudmesh-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
