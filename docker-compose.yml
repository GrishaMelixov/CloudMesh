version: "3.9"

x-app-env: &app-env
  KAFKA_BROKERS: kafka:9092
  KAFKA_TOPIC_RAW: cloudmesh.logs.raw
  KAFKA_TOPIC_ERRORS: cloudmesh.logs.errors
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "9000"
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 15

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic cloudmesh.logs.raw --partitions 12 --replication-factor 1 \
          --config retention.ms=86400000 --config compression.type=lz4
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic cloudmesh.logs.errors --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000 --config compression.type=lz4
        echo "Topics created"

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/init-clickhouse-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      retries: 20

  # ── Application ───────────────────────────────────────────────────────────

  log-collector:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.collector
    ports:
      - "50051:50051"
    environment:
      <<: *app-env
      GRPC_ADDR: ":50051"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  log-producer:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.producer
    environment:
      <<: *app-env
      LOG_COLLECTOR_ADDR: log-collector:50051
      EVENTS_PER_SEC: "200"
      BATCH_SIZE: "500"
      ERROR_RATE_PCT: "5"
    depends_on:
      - log-collector
    restart: on-failure

  log-aggregator:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.aggregator
    environment:
      <<: *app-env
      ERROR_RATE_THRESHOLD: "10"
      ERROR_RATE_WINDOW_SEC: "60"
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  metrics-api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
      HTTP_ADDR: ":8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

volumes:
  clickhouse-data:
