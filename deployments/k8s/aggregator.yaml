apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-aggregator
  namespace: cloudmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-aggregator
  template:
    metadata:
      labels:
        app: log-aggregator
    spec:
      containers:
        - name: log-aggregator
          image: grishamelixov/cloudmesh-aggregator:latest
          envFrom:
            - configMapRef:
                name: cloudmesh-config
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: log-aggregator-hpa
  namespace: cloudmesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: log-aggregator
  minReplicas: 1
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
