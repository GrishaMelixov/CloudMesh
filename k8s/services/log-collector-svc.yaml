apiVersion: v1
kind: Service
metadata:
  name: log-collector-service
  namespace: cloudmesh
  labels:
    app: log-collector
spec:
  selector:
    app: log-collector
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: http
      port: 50052
      targetPort: 50052
      protocol: TCP
  type: ClusterIP
