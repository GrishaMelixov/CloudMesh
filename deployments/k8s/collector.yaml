apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-collector
  namespace: cloudmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      containers:
        - name: log-collector
          image: grishamelixov/cloudmesh-collector:latest
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: cloudmesh-config
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: log-collector
  namespace: cloudmesh
spec:
  selector:
    app: log-collector
  ports:
    - port: 50051
      targetPort: 50051
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: log-collector-hpa
  namespace: cloudmesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: log-collector
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
