name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Unit tests + lint for each service ─────────────────────────────────────
  unit-test:
    name: Unit tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [log-producer, log-collector, log-aggregator, metrics-api]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install service dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Install test/lint tools
        run: pip install ruff pytest pytest-asyncio

      - name: Generate protobuf stubs
        run: |
          pip install grpcio-tools
          python -m grpc_tools.protoc \
            -I proto \
            --python_out=services/${{ matrix.service }} \
            --grpc_python_out=services/${{ matrix.service }} \
            proto/logs.proto
        # log-aggregator and metrics-api don't use gRPC directly but we generate
        # stubs in all services for consistency

      - name: Lint with ruff
        run: ruff check services/${{ matrix.service }} --ignore E501

      - name: Run unit tests (no infrastructure required)
        run: pytest tests/ -v -k "not integration" --tb=short

  # ── Integration tests against a real ClickHouse ────────────────────────────
  integration-test:
    name: Integration tests (ClickHouse)
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - "9000:9000"
          - "8123:8123"
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install clickhouse-driver pytest

      - name: Run integration tests
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"
          CLICKHOUSE_DB: cloudmesh
        run: pytest tests/test_clickhouse_write.py -v -k "integration" --tb=short

  # ── Docker build verification ───────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        service: [log-producer, log-collector, log-aggregator, metrics-api]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: cloudmesh/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
