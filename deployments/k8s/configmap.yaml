apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudmesh-config
  namespace: cloudmesh
data:
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_TOPIC_RAW: "cloudmesh.logs.raw"
  KAFKA_TOPIC_ERRORS: "cloudmesh.logs.errors"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "9000"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  GRPC_ADDR: ":50051"
  HTTP_ADDR: ":8080"
  LOG_COLLECTOR_ADDR: "log-collector:50051"
  EVENTS_PER_SEC: "200"
  BATCH_SIZE: "500"
  ERROR_RATE_PCT: "5"
  ERROR_RATE_THRESHOLD: "10"
  ERROR_RATE_WINDOW_SEC: "60"
