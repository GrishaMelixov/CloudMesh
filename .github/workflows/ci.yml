name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: collector
            dockerfile: deployments/docker/Dockerfile.collector
          - service: producer
            dockerfile: deployments/docker/Dockerfile.producer
          - service: aggregator
            dockerfile: deployments/docker/Dockerfile.aggregator
          - service: api
            dockerfile: deployments/docker/Dockerfile.api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: cloudmesh/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
