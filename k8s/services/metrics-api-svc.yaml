apiVersion: v1
kind: Service
metadata:
  name: metrics-api-service
  namespace: cloudmesh
  labels:
    app: metrics-api
spec:
  selector:
    app: metrics-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  # LoadBalancer → gets an external IP on AWS (ELB) / GCP (Network LB)
  type: LoadBalancer
